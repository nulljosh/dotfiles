<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="40" fill="#111"/>
  <!-- Dot pattern (dotfiles) -->
  <circle cx="60" cy="60" r="4" fill="#a6e3a1" opacity="0.3"/>
  <circle cx="100" cy="60" r="4" fill="#a6e3a1" opacity="0.3"/>
  <circle cx="140" cy="60" r="4" fill="#a6e3a1" opacity="0.3"/>
  <circle cx="60" cy="100" r="4" fill="#89b4fa" opacity="0.4"/>
  <circle cx="140" cy="100" r="4" fill="#89b4fa" opacity="0.4"/>
  <!-- Center gear/config symbol -->
  <circle cx="100" cy="100" r="18" fill="none" stroke="#cba6f7" stroke-width="2.5" opacity="0.8"/>
  <circle cx="100" cy="100" r="7" fill="#cba6f7" opacity="0.8"/>
  <!-- Gear teeth -->
  <rect x="96" y="78" width="8" height="8" rx="1.5" fill="#cba6f7" opacity="0.8"/>
  <rect x="96" y="114" width="8" height="8" rx="1.5" fill="#cba6f7" opacity="0.8"/>
  <rect x="78" y="96" width="8" height="8" rx="1.5" fill="#cba6f7" opacity="0.8"/>
  <rect x="114" y="96" width="8" height="8" rx="1.5" fill="#cba6f7" opacity="0.8"/>
  <!-- Connection lines from dots to gear -->
  <line x1="60" y1="60" x2="86" y2="86" stroke="#a6e3a1" stroke-width="1" opacity="0.2"/>
  <line x1="140" y1="60" x2="114" y2="86" stroke="#a6e3a1" stroke-width="1" opacity="0.2"/>
  <line x1="60" y1="100" x2="78" y2="100" stroke="#89b4fa" stroke-width="1" opacity="0.2"/>
  <line x1="140" y1="100" x2="122" y2="100" stroke="#89b4fa" stroke-width="1" opacity="0.2"/>
  <!-- Bottom dots -->
  <circle cx="60" cy="140" r="4" fill="#a6e3a1" opacity="0.3"/>
  <circle cx="100" cy="140" r="4" fill="#a6e3a1" opacity="0.3"/>
  <circle cx="140" cy="140" r="4" fill="#a6e3a1" opacity="0.3"/>
  <line x1="60" y1="140" x2="86" y2="114" stroke="#a6e3a1" stroke-width="1" opacity="0.2"/>
  <line x1="140" y1="140" x2="114" y2="114" stroke="#a6e3a1" stroke-width="1" opacity="0.2"/>
  <!-- Label -->
  <text x="100" y="172" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#888" opacity="0.7">.dotfiles</text>
</svg>
