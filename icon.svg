<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="32" style="fill:#1a1a1a"/>
  <!-- Terminal window frame -->
  <rect x="30" y="38" width="140" height="100" rx="12" style="fill:rgba(255,255,255,0.06);stroke:rgba(255,255,255,0.12);stroke-width:1"/>
  <!-- Title bar shimmer -->
  <rect x="38" y="40" width="124" height="1" rx="0.5" style="fill:rgba(255,255,255,0.08)"/>
  <!-- Title bar dots -->
  <circle cx="46" cy="50" r="3" style="fill:rgba(255,255,255,0.15)"/>
  <circle cx="58" cy="50" r="3" style="fill:rgba(255,255,255,0.15)"/>
  <circle cx="70" cy="50" r="3" style="fill:rgba(255,255,255,0.15)"/>
  <!-- Title bar separator -->
  <line x1="36" y1="58" x2="164" y2="58" style="stroke:rgba(255,255,255,0.06);stroke-width:0.75"/>
  <!-- Terminal prompt lines -->
  <rect x="42" y="66" width="6" height="2" rx="1" style="fill:rgba(255,255,255,0.45)"/>
  <rect x="52" y="66" width="36" height="2" rx="1" style="fill:rgba(255,255,255,0.25)"/>
  <rect x="42" y="76" width="6" height="2" rx="1" style="fill:rgba(255,255,255,0.45)"/>
  <rect x="52" y="76" width="52" height="2" rx="1" style="fill:rgba(255,255,255,0.2)"/>
  <rect x="42" y="86" width="6" height="2" rx="1" style="fill:rgba(255,255,255,0.45)"/>
  <rect x="52" y="86" width="28" height="2" rx="1" style="fill:rgba(255,255,255,0.15)"/>
  <!-- Cursor block -->
  <rect x="84" y="85" width="7" height="4" rx="1" style="fill:rgba(255,255,255,0.6)"/>
  <!-- Output line -->
  <rect x="46" y="96" width="44" height="2" rx="1" style="fill:rgba(255,255,255,0.1)"/>
  <rect x="46" y="103" width="60" height="2" rx="1" style="fill:rgba(255,255,255,0.08)"/>
  <!-- Config dots below terminal -->
  <circle cx="72" cy="156" r="4" style="fill:rgba(255,255,255,0.06);stroke:rgba(255,255,255,0.1);stroke-width:0.75"/>
  <circle cx="72" cy="156" r="1.5" style="fill:rgba(255,255,255,0.3)"/>
  <circle cx="90" cy="156" r="4" style="fill:rgba(255,255,255,0.06);stroke:rgba(255,255,255,0.1);stroke-width:0.75"/>
  <circle cx="90" cy="156" r="1.5" style="fill:rgba(255,255,255,0.3)"/>
  <circle cx="108" cy="156" r="4" style="fill:rgba(255,255,255,0.06);stroke:rgba(255,255,255,0.1);stroke-width:0.75"/>
  <circle cx="108" cy="156" r="1.5" style="fill:rgba(255,255,255,0.3)"/>
  <circle cx="126" cy="156" r="4" style="fill:rgba(255,255,255,0.06);stroke:rgba(255,255,255,0.1);stroke-width:0.75"/>
  <circle cx="126" cy="156" r="1.5" style="fill:rgba(255,255,255,0.3)"/>
  <!-- Connecting lines from terminal to dots -->
  <line x1="72" y1="140" x2="72" y2="152" style="stroke:rgba(255,255,255,0.05);stroke-width:0.75"/>
  <line x1="90" y1="140" x2="90" y2="152" style="stroke:rgba(255,255,255,0.05);stroke-width:0.75"/>
  <line x1="108" y1="140" x2="108" y2="152" style="stroke:rgba(255,255,255,0.05);stroke-width:0.75"/>
  <line x1="126" y1="140" x2="126" y2="152" style="stroke:rgba(255,255,255,0.05);stroke-width:0.75"/>
</svg>