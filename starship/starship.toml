# Catppuccin Mocha powerline prompt (requires a Nerd Font for the separators)

add_newline = false

format = """
[Óā∂](fg:#89b4fa)\
$username\
[Óāį](fg:#89b4fa bg:#74c7ec)\
$hostname\
[Óāį](fg:#74c7ec bg:#fab387)\
$time\
[Óāį](fg:#fab387 bg:#89b4fa)\
$directory\
[Óāį](fg:#89b4fa bg:#cba6f7)\
$git_branch$git_status\
[Óāį](fg:#cba6f7 bg:#a6e3a1)\
$nodejs$python$rust$ruby\
[Óāį](fg:#a6e3a1)\
$cmd_duration\
$character"""

[username]
show_always = true
format = "[ $user ]($style)"
style_user = "bg:#89b4fa fg:#1e1e2e bold"
style_root = "bg:#89b4fa fg:#1e1e2e bold"

[hostname]
ssh_only = false
format = "[ ůįüÄ $hostname ]($style)"
style = "bg:#74c7ec fg:#1e1e2e bold"
trim_at = ".local"

[time]
disabled = false
time_format = "%H:%M"
format = "[ Ôźļ $time ]($style)"
style = "bg:#fab387 fg:#1e1e2e bold"

[directory]
format = "[ $path ]($style)"
style = "bg:#89b4fa fg:#1e1e2e bold"
truncation_length = 3
truncate_to_repo = true

[git_branch]
symbol = "Óā†"
format = "[ $symbol$branch ]($style)"
style = "bg:#cba6f7 fg:#1e1e2e"

[git_status]
format = "[$all_status$ahead_behind]($style)"
style = "bg:#cba6f7 fg:#1e1e2e"

[nodejs]
symbol = "ůįéô"
format = "[ $symbol$version ]($style)"
style = "bg:#a6e3a1 fg:#1e1e2e"

[python]
symbol = "ÓėÜ"
format = "[ $symbol$version ]($style)"
style = "bg:#a6e3a1 fg:#1e1e2e"

[rust]
symbol = "ůĪėó"
format = "[ $symbol$version ]($style)"
style = "bg:#a6e3a1 fg:#1e1e2e"

[ruby]
symbol = "ÓěĎ"
format = "[ $symbol$version ]($style)"
style = "bg:#a6e3a1 fg:#1e1e2e"

[cmd_duration]
min_time = 2_000
style = "bold #f9e2af"
format = "[ $duration ]($style)"

[character]
success_symbol = "[‚ĚĮ](bold #a6e3a1)"
error_symbol = "[‚ĚĮ](bold #f38ba8)"
vimcmd_symbol = "[‚Ěģ](bold #89b4fa)"
